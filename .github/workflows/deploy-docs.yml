name: Deploy docs to GitHub Pages

# Opt every JavaScript action into Node.js 24. Node 20 is deprecated on GitHub
# runners (forced to Node 24 from 2026-06-16, removed 2026-09-16); this covers
# configure-pages / upload-pages-artifact / deploy-pages without waiting for new
# major versions of those actions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - 'chapters/**'
      - 'examples/**'
      - 'index.md'
      - '.vitepress/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; do not cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so VitePress "last updated" works
      - uses: oven-sh/setup-bun@v2
      # No install step needed: vitepress is fetched on demand by `bun x`, and
      # snippet imports only read the example files as text (they are not run).
      - name: Build VitePress site
        run: bun x vitepress@2.0.0-alpha.17 build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
